# ============================================================
# values.yaml — Configuration par défaut du chart TaskManager
# Surcharger avec : helm install ... -f values-prod.yaml
# ============================================================

replicaCount: 2
environment: prod

image:
  repository: ghcr.io/elbassir/taskmanager
  pullPolicy: Always
  tag: 'latest'

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: alb
  host: '' # ← vide = pas de restriction de domaine
  tls: false # ← désactiver TLS/HTTPS
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Supprimer ssl-redirect et listen-ports HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/success-codes: '200'

resources:
  requests:
    memory: '256Mi'
    cpu: '250m'
  limits:
    memory: '512Mi'
    cpu: '500m'

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 45
    periodSeconds: 15
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10

config:
  springProfiles: prod
  logLevel: INFO

db:
  secretName: taskmanager-db-secret

monitoring:
  prometheus:
    enabled: true
    path: /actuator/prometheus
    port: 8080
