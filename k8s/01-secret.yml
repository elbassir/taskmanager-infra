# ============================================================
# Secret — Credentials DB (à créer via kubectl ou Terraform)
# NE PAS commiter avec de vraies valeurs !
# ============================================================
#
# Créer via kubectl :
#   kubectl create secret generic taskmanager-db-secret \
#     --namespace taskmanager \
#     --from-literal=DB_URL='jdbc:postgresql://<RDS_ENDPOINT>:5432/taskdb' \
#     --from-literal=DB_USERNAME='taskadmin' \
#     --from-literal=DB_PASSWORD='<PASSWORD>'
#
# Ou via AWS Secrets Manager + External Secrets Operator
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: taskmanager-db-secret
  namespace: taskmanager
type: Opaque
data:
  # Valeurs encodées en base64 — REMPLACER par les vraies valeurs
  # echo -n "valeur" | base64
  DB_URL:      amRiYzpwb3N0Z3Jlc3FsOi8vbG9jYWxob3N0OjU0MzIvdGFza2Ri
  DB_USERNAME: dGFza2FkbWlu
  DB_PASSWORD: Q0hBTkdFX01F
