name: Terraform — Plan & Validate

on:
  pull_request:
    paths:
      - 'infra/terraform/**'

defaults:
  run:
    working-directory: infra/terraform

jobs:
  terraform-check:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-3

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - name: Terraform Plan (commentaire PR)
        id: plan
        env:
          TF_VAR_db_password:            ${{ secrets.DB_PASSWORD }}
          TF_VAR_ghcr_username:          ${{ secrets.GHCR_USERNAME }}
          TF_VAR_ghcr_token:             ${{ secrets.GHCR_TOKEN }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Commenter la PR avec le plan
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pusher: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
