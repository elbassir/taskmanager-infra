name: CI/CD — TaskManager Infra

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de l'image Docker à déployer"
        required: false
        default: 'latest'

env:
  AWS_REGION: eu-west-3

jobs:

  # ============================================================
  # Job 1 — Terraform Apply
  # ============================================================
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_db_password:   ${{ secrets.DB_PASSWORD }}
      TF_VAR_ghcr_username: ${{ secrets.GHCR_USERNAME }}
      TF_VAR_ghcr_token:    ${{ secrets.GHCR_TOKEN }}
      TF_VAR_app_image_tag: ${{ github.event.inputs.image_tag || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ============================================================
  # Job 2 — Déploiement Helm sur EKS
  # ============================================================
  deploy:
    name: 🚀 Déploiement Helm → EKS
    runs-on: ubuntu-latest
    needs: terraform
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configurer kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name eks-cluster-taskmanager

      - name: Déploiement Helm
        run: |
          helm upgrade --install taskmanager ./helm/taskmanager \
            --namespace taskmanager \
            --create-namespace \
            --set image.tag=${{ github.event.inputs.image_tag || 'latest' }} \
            --wait --timeout 5m

      - name: Vérification du déploiement
        run: |
          kubectl rollout status deployment/taskmanager -n taskmanager
          kubectl get pods -n taskmanager
          echo "✅ Déploiement ${{ github.event.inputs.image_tag || 'latest' }} réussi !"
