name: CI/CD — TaskManager PFE DevOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   eu-west-3
  ECR_REGISTRY: ghcr.io
  IMAGE_NAME:   ${{ github.repository }}/taskmanager

jobs:

  # ============================================================
  # Job 1 — Tests & Build
  # ============================================================
  build-test:
    name: 🔨 Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Tests unitaires + couverture JaCoCo
        run: mvn verify

      - name: Upload rapport JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Build JAR
        run: mvn package -DskipTests -q

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ============================================================
  # Job 2 — Qualité SonarCloud
  # ============================================================
  sonar:
    name: 🔍 SonarCloud
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: temurin, cache: maven }

      - name: Analyse SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=pfe-taskmanager \
            -Dsonar.organization=${{ github.repository_owner }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # ============================================================
  # Job 3 — Build & Push image Docker vers GHCR
  # ============================================================
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4 — Terraform Plan (sur PR) / Apply (sur main)
  # ============================================================
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_db_password:    ${{ secrets.DB_PASSWORD }}
      TF_VAR_app_image_tag:  ${{ needs.docker.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ============================================================
  # Job 5 — Déploiement Helm sur EKS
  # ============================================================
  deploy:
    name: 🚀 Déploiement Helm → EKS
    runs-on: ubuntu-latest
    needs: terraform
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configurer kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name eks-cluster-taskmanager

      - name: Déploiement Helm
        run: |
          helm upgrade --install taskmanager ./helm/taskmanager \
            --namespace taskmanager \
            --create-namespace \
            --set image.tag=${{ needs.docker.outputs.image_tag }} \
            --wait --timeout 5m

      - name: Vérification du déploiement
        run: |
          kubectl rollout status deployment/taskmanager -n taskmanager
          kubectl get pods -n taskmanager
          echo "✅ Déploiement ${{ needs.docker.outputs.image_tag }} réussi !"
